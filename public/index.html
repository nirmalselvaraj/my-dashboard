<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════
   RESET & TOKENS
   ═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#6366f1;
  --primary-glow:rgba(99,102,241,.35);
  --accent:#06b6d4;
  --accent-glow:rgba(6,182,212,.3);
  --success:#10b981;
  --success-glow:rgba(16,185,129,.3);
  --danger:#ef4444;
  --danger-glow:rgba(239,68,68,.3);
  --warn:#f59e0b;
  --bg:#030712;
  --surface:rgba(15,23,42,.72);
  --surface-hover:rgba(15,23,42,.88);
  --border:rgba(99,102,241,.18);
  --border-hover:rgba(99,102,241,.42);
  --text:#f1f5f9;
  --text-muted:#94a3b8;
  --text-dim:#475569;
  --radius:20px;
  --mono:'JetBrains Mono',monospace;
  --tc:#00b087;
  --ai:#8b5cf6;
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.5;
}

/* ═══════════════════════════════════════════════════
   BACKGROUND  — STARS + GRADIENTS
   ═══════════════════════════════════════════════════ */
#bg-canvas{
  position:fixed;inset:0;z-index:0;pointer-events:none;
}
.bg-gradient{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(99,102,241,.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%,  rgba(6,182,212,.10)  0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%,   rgba(139,92,246,.06) 0%, transparent 70%);
}

/* ═══════════════════════════════════════════════════
   LAYOUT WRAPPER
   ═══════════════════════════════════════════════════ */
#app{
  position:relative;z-index:1;
  max-width:1440px;margin:0 auto;
  padding:24px 28px 40px;
}

/* ═══════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════ */
header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
  padding:20px 28px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
}
.header-left{display:flex;flex-direction:column;gap:4px}
.logo{
  font-size:clamp(1.4rem,3vw,2rem);font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(135deg,#a5b4fc 0%,#6366f1 40%,#06b6d4 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-transform:uppercase;letter-spacing:3px;
}
.tagline{font-size:.7rem;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;font-weight:500}
.header-right{display:flex;align-items:center;gap:18px}
#live-clock{
  font-family:var(--mono);font-size:1.1rem;font-weight:600;
  color:var(--accent);text-align:right;
}
#live-date{
  font-size:.72rem;color:var(--text-muted);text-align:right;font-weight:500;
  text-transform:uppercase;letter-spacing:1px;margin-top:2px;
}
.refresh-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}
#refresh-btn{
  display:flex;align-items:center;gap:8px;
  padding:10px 20px;border-radius:12px;border:1px solid var(--border-hover);
  background:rgba(99,102,241,.12);color:var(--primary);
  font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
}
#refresh-btn:hover{background:rgba(99,102,241,.25);box-shadow:0 0 20px var(--primary-glow);transform:translateY(-1px)}
#refresh-btn svg{transition:transform .6s}
#refresh-btn:hover svg{transform:rotate(180deg)}
#countdown{font-size:.65rem;color:var(--text-dim);font-family:var(--mono);text-align:center}

/* ═══════════════════════════════════════════════════
   MAIN GRID
   ═══════════════════════════════════════════════════ */
.main-grid{
  display:grid;
  grid-template-columns:1fr 2fr;
  gap:22px;
  margin-bottom:22px;
}
.news-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:22px;
}

/* ═══════════════════════════════════════════════════
   GLASS CARD BASE
   ═══════════════════════════════════════════════════ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  transition:transform .25s ease,box-shadow .25s ease,border-color .25s ease;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-3px);
  box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 30px var(--primary-glow);
  border-color:var(--border-hover);
}

/* ═══════════════════════════════════════════════════
   SECTION LABELS
   ═══════════════════════════════════════════════════ */
.section-label{
  font-size:.65rem;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}
.dot{
  width:7px;height:7px;border-radius:50%;
  display:inline-block;flex-shrink:0;
}

/* ═══════════════════════════════════════════════════
   WEATHER CARD
   ═══════════════════════════════════════════════════ */
#weather-card{
  display:flex;flex-direction:column;gap:0;
  min-height:320px;
  transition:background .5s ease,transform .25s ease,box-shadow .25s ease,border-color .25s ease;
}
#weather-card.sunny  {background:linear-gradient(145deg,rgba(251,146,60,.18),rgba(250,204,21,.12),rgba(15,23,42,.72))}
#weather-card.cloudy {background:linear-gradient(145deg,rgba(100,116,139,.22),rgba(71,85,105,.15),rgba(15,23,42,.72))}
#weather-card.rainy  {background:linear-gradient(145deg,rgba(59,130,246,.22),rgba(99,102,241,.15),rgba(15,23,42,.72))}
#weather-card.snowy  {background:linear-gradient(145deg,rgba(186,230,253,.15),rgba(224,242,254,.1),rgba(15,23,42,.72))}
#weather-card.stormy {background:linear-gradient(145deg,rgba(139,92,246,.2),rgba(67,56,202,.15),rgba(15,23,42,.72))}
#weather-card.foggy  {background:linear-gradient(145deg,rgba(148,163,184,.15),rgba(100,116,139,.12),rgba(15,23,42,.72))}

.weather-label{color:var(--text-muted)}
.weather-emoji{font-size:3.5rem;line-height:1;margin:4px 0 8px;filter:drop-shadow(0 0 12px rgba(255,200,0,.3))}
.weather-temp{
  font-size:4rem;font-weight:900;font-family:var(--mono);
  background:linear-gradient(135deg,#fbbf24,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;
}
.weather-desc{font-size:.9rem;color:var(--text-muted);margin:6px 0 16px;text-transform:capitalize;font-weight:500}
.weather-location{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.weather-location svg{color:var(--accent);flex-shrink:0}
.weather-meta{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  margin-top:auto;padding-top:16px;border-top:1px solid var(--border);
}
.weather-meta-item{
  background:rgba(0,0,0,.2);border-radius:10px;padding:10px 12px;
  display:flex;flex-direction:column;gap:2px;
}
.meta-label{font-size:.62rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.meta-value{font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--text)}

/* ═══════════════════════════════════════════════════
   STOCKS SECTION
   ═══════════════════════════════════════════════════ */
#stocks-section{display:flex;flex-direction:column;gap:14px}
#stocks-section .section-label{color:var(--primary)}
#stocks-section .dot{background:var(--primary);box-shadow:0 0 8px var(--primary)}
.stocks-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

/* stock card */
.stock-card{
  background:rgba(15,23,42,.8);
  border:1px solid var(--border);
  border-radius:16px;padding:16px 18px;
  cursor:default;
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
  position:relative;overflow:hidden;
}
.stock-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 55%);
  pointer-events:none;border-radius:inherit;
}
.stock-card:hover{transform:translateY(-3px);border-color:var(--border-hover)}
.stock-card.positive{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.04)}
.stock-card.positive:hover{box-shadow:0 12px 40px rgba(16,185,129,.15);border-color:rgba(16,185,129,.45)}
.stock-card.negative{border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.04)}
.stock-card.negative:hover{box-shadow:0 12px 40px rgba(239,68,68,.12);border-color:rgba(239,68,68,.35)}
.stock-card.private-card{border-color:rgba(148,163,184,.2);background:rgba(30,41,59,.6);cursor:default}
.stock-card.private-card:hover{box-shadow:0 12px 40px rgba(148,163,184,.08)}

.stock-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.stock-symbol{
  font-family:var(--mono);font-size:.9rem;font-weight:700;
  color:var(--text);letter-spacing:.5px;
}
.stock-badge{
  font-size:.55rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  padding:2px 7px;border-radius:6px;
}
.badge-crypto{background:rgba(6,182,212,.15);color:var(--accent);border:1px solid rgba(6,182,212,.25)}
.badge-private{background:rgba(148,163,184,.12);color:var(--text-muted);border:1px solid rgba(148,163,184,.2)}
.badge-equity{background:rgba(99,102,241,.12);color:var(--primary);border:1px solid rgba(99,102,241,.2)}

.stock-name{font-size:.72rem;color:var(--text-muted);margin-bottom:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stock-price{
  font-family:var(--mono);font-size:1.45rem;font-weight:700;
  color:var(--text);margin-bottom:6px;
  transition:color .3s;
}
.stock-change{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:.78rem;font-weight:600;
}
.stock-change.up{color:var(--success)}
.stock-change.dn{color:var(--danger)}
.stock-change.nt{color:var(--text-muted)}

.private-info{
  font-size:.72rem;color:var(--text-dim);margin-top:8px;
  display:flex;align-items:center;gap:5px;
  padding:6px 10px;background:rgba(0,0,0,.2);border-radius:8px;
}

/* ═══════════════════════════════════════════════════
   NEWS CARDS
   ═══════════════════════════════════════════════════ */
.news-card{display:flex;flex-direction:column;gap:0}
.news-card.tc-card{border-color:rgba(0,176,135,.2)}
.news-card.tc-card:hover{box-shadow:0 20px 60px rgba(0,176,135,.12),0 0 30px rgba(0,176,135,.1);border-color:rgba(0,176,135,.4)}
.news-card.ai-card{border-color:rgba(139,92,246,.2)}
.news-card.ai-card:hover{box-shadow:0 20px 60px rgba(139,92,246,.12),0 0 30px rgba(139,92,246,.1);border-color:rgba(139,92,246,.4)}

.news-label.tc .dot{background:var(--tc);box-shadow:0 0 8px var(--tc)}
.news-label.tc{color:var(--tc)}
.news-label.ai .dot{background:var(--ai);box-shadow:0 0 8px var(--ai)}
.news-label.ai{color:var(--ai)}

.news-item{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
  display:flex;flex-direction:column;gap:6px;
}
.news-item:last-child{border-bottom:none;padding-bottom:0}
.news-item:first-child{padding-top:0}
.news-link{
  color:var(--text);text-decoration:none;font-weight:600;font-size:.88rem;
  line-height:1.4;display:flex;gap:6px;align-items:flex-start;
  transition:color .2s;
}
.news-link:hover{color:var(--accent)}
.news-link svg{flex-shrink:0;margin-top:2px;opacity:.5;transition:opacity .2s}
.news-link:hover svg{opacity:1}
.news-time{font-size:.65rem;color:var(--text-dim);font-family:var(--mono);font-weight:500;letter-spacing:.5px}
.news-snip{font-size:.75rem;color:var(--text-muted);line-height:1.5;margin-top:2px}

/* ═══════════════════════════════════════════════════
   SKELETON LOADER
   ═══════════════════════════════════════════════════ */
@keyframes shimmer{
  0%{background-position:-600px 0}
  100%{background-position:600px 0}
}
.skel{
  border-radius:8px;
  background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 75%);
  background-size:1200px 100%;
  animation:shimmer 1.8s infinite linear;
}
.skel-text{height:14px;margin-bottom:8px}
.skel-title{height:20px;width:60%;margin-bottom:12px}
.skel-big{height:52px;width:50%;margin-bottom:10px}
.skel-sm{height:12px;width:40%}

/* ═══════════════════════════════════════════════════
   ERROR STATE
   ═══════════════════════════════════════════════════ */
.error-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--text-muted);text-align:center;padding:24px;
  font-size:.85rem;min-height:120px;
}
.error-msg .err-icon{font-size:2rem;opacity:.6}
.error-msg .err-text{font-weight:500}
.error-msg .err-sub{font-size:.72rem;color:var(--text-dim)}

/* ═══════════════════════════════════════════════════
   LIVE INDICATOR
   ═══════════════════════════════════════════════════ */
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--success);
  box-shadow:0 0 6px var(--success);
  display:inline-block;
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:.4;transform:scale(.7)}
}

/* ═══════════════════════════════════════════════════
   NUMBER FLASH ANIMATION
   ═══════════════════════════════════════════════════ */
@keyframes flash-green{
  0%{color:var(--success)}
  100%{color:inherit}
}
@keyframes flash-red{
  0%{color:var(--danger)}
  100%{color:inherit}
}
.flash-up{animation:flash-green .8s ease-out}
.flash-dn{animation:flash-red .8s ease-out}

/* ═══════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════ */
@media(max-width:1100px){
  .stocks-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:860px){
  .main-grid{grid-template-columns:1fr}
  .news-grid{grid-template-columns:1fr}
  .stocks-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:520px){
  #app{padding:14px 14px 30px}
  .stocks-grid{grid-template-columns:1fr}
  header{flex-direction:column;gap:16px;text-align:center}
  .header-right{justify-content:center;flex-wrap:wrap}
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="bg-gradient"></div>

<div id="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="header-left">
      <div class="logo">My Dashboard</div>
      <div class="tagline">Real-time financial &amp; tech intelligence</div>
    </div>
    <div class="header-right">
      <div>
        <div id="live-clock">--:--:--</div>
        <div id="live-date">Loading...</div>
      </div>
      <div class="refresh-wrap">
        <button id="refresh-btn" onclick="refreshAll()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
          Refresh
        </button>
        <div id="countdown">Next refresh in <span id="countdown-sec">300</span>s</div>
      </div>
    </div>
  </header>

  <!-- ── TOP ROW: Weather + Stocks ── -->
  <div class="main-grid">

    <!-- WEATHER -->
    <div class="card" id="weather-card">
      <div class="section-label weather-label">
        <span class="dot" style="background:var(--accent);box-shadow:0 0 8px var(--accent)"></span>
        Weather
        <span class="live-dot" style="margin-left:4px"></span>
      </div>
      <div id="weather-content">
        <!-- skeleton -->
        <div class="skel skel-big" style="margin-bottom:14px;height:60px;width:55%"></div>
        <div class="skel skel-text" style="width:70%"></div>
        <div class="skel skel-text" style="width:55%"></div>
        <div style="margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div class="skel" style="height:58px;border-radius:10px"></div>
          <div class="skel" style="height:58px;border-radius:10px"></div>
          <div class="skel" style="height:58px;border-radius:10px"></div>
          <div class="skel" style="height:58px;border-radius:10px"></div>
        </div>
      </div>
    </div>

    <!-- STOCKS -->
    <div id="stocks-section">
      <div class="section-label" style="color:var(--primary)">
        <span class="dot" style="background:var(--primary);box-shadow:0 0 8px var(--primary)"></span>
        Market Snapshot
        <span class="live-dot" style="margin-left:4px"></span>
      </div>
      <div class="stocks-grid" id="stocks-grid">
        <!-- skeleton cards -->
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
        <div class="card stock-card" style="min-height:130px">
          <div class="skel skel-title"></div><div class="skel skel-text" style="width:80%"></div>
          <div class="skel skel-big"></div><div class="skel skel-sm"></div>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->

  <!-- ── BOTTOM ROW: News ── -->
  <div class="news-grid">

    <!-- TechCrunch -->
    <div class="card news-card tc-card">
      <div class="section-label news-label tc">
        <span class="dot" style="background:var(--tc);box-shadow:0 0 8px var(--tc)"></span>
        TechCrunch
      </div>
      <div id="tc-content">
        <div class="skel skel-title"></div>
        <div class="skel skel-text" style="width:90%"></div>
        <div class="skel skel-sm" style="margin-bottom:16px"></div>
        <div class="skel skel-title"></div>
        <div class="skel skel-text" style="width:85%"></div>
        <div class="skel skel-sm" style="margin-bottom:16px"></div>
        <div class="skel skel-title"></div>
        <div class="skel skel-text" style="width:80%"></div>
        <div class="skel skel-sm"></div>
      </div>
    </div>

    <!-- AI News -->
    <div class="card news-card ai-card">
      <div class="section-label news-label ai">
        <span class="dot" style="background:var(--ai);box-shadow:0 0 8px var(--ai)"></span>
        AI &amp; Tech — VentureBeat
      </div>

/* ═══════════════════════════════════════════════════════════════════
   STARS BACKGROUND
   ═══════════════════════════════════════════════════════════════════ */
(function initStars() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let stars    = [];
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    createStars();
  }

  function createStars() {
    stars = [];
    const count = Math.floor((W * H) / 6000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x:     Math.random() * W,
        y:     Math.random() * H,
        r:     Math.random() * 1.2 + .2,
        alpha: Math.random() * .6 + .1,
        speed: Math.random() * .3 + .05,
        dir:   Math.random() * Math.PI * 2,
        twinkleSpeed: Math.random() * .02 + .005,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
  }

  let t = 0;
  function animate() {
    ctx.clearRect(0, 0, W, H);
    t += .016;
    stars.forEach(s => {
      const alpha = s.alpha * (.6 + .4 * Math.sin(t * s.twinkleSpeed * 60 + s.twinkleOffset));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,210,255,${alpha})`;
      ctx.fill();
      s.x += Math.cos(s.dir) * s.speed * .1;
      s.y += Math.sin(s.dir) * s.speed * .1;
      if (s.x < -2) s.x = W + 2;
      if (s.x > W + 2) s.x = -2;
      if (s.y < -2) s.y = H + 2;
      if (s.y > H + 2) s.y = -2;
    });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  resize();
  animate();
})();

const REFRESH_INTERVAL = 300; // seconds
let countdownSec = REFRESH_INTERVAL;
let countdownTimer;

function startCountdown() {
  clearInterval(countdownTimer);
  countdownSec = REFRESH_INTERVAL;
  updateCountdownUI();
  countdownTimer = setInterval(() => {
    countdownSec--;
    updateCountdownUI();
    if (countdownSec <= 0) {
      refreshAll();
    }
  }, 1000);
}

function updateCountdownUI() {
  const el = document.getElementById('countdown-sec');
  if (el) el.textContent = countdownSec;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d    = new Date(dateStr);
  if (isNaN(d)) return '';
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60)   return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

function fmtPrice(n, cur) {
  if (n == null) return '—';
  const isCrypto = cur === 'USD' && n > 100;
  if (n >= 1000) return n.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2});
  return n.toFixed(n < 1 ? 4 : 2);
}

function fmtPct(n) {
  if (n == null) return '—';
  const sign = n >= 0 ? '+' : '';
  return `${sign}${n.toFixed(2)}%`;
}

async function fetchWeather(lat, lon) {
  const url = lat != null
    ? `/api/weather?lat=${lat}&lon=${lon}`
    : null;

  if (!url) {
    renderWeatherError('Location unavailable. Enable browser location to see weather.');
    return;
  }

  try {
    const res  = await fetch(url);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'Weather API error');
    renderWeather(json.data);
  } catch (e) {
    renderWeatherError(e.message || 'Failed to load weather');
  }
}

function renderWeatherError(msg) {
  const card = document.getElementById('weather-card');
  card.className = 'card';

}

  const wClass = weatherClass(code);
  const city  = area.areaName[0].value;
  const region = area.region[0].value;
  const country = area.country[0].value;

  const wind = cur.windspeedMiles + ' mph';
  const vis  = cur.visibility + ' mi';
  const uv   = cur.uvIndex;

  card.classList.add(wClass);

function stockCard(s) {
  const pct   = s.changePercent;
  const up    = pct >= 0;
  const cls   = pct == null ? '' : (up ? 'positive' : 'negative');
  const arrow = pct == null ? '' : (up ? '▲' : '▼');
  const chgCls = pct == null ? 'nt' : (up ? 'up' : 'dn');
  const isCrypto = CRYPTO_SYMS.has(s.symbol);
  const badgeCls = isCrypto ? 'badge-crypto' : 'badge-equity';
  const badgeLabel = isCrypto ? (CRYPTO_ICONS[s.symbol] || 'CRYPTO') : 'EQUITY';
  const price = fmtPrice(s.price, s.currency);
  const prev  = prevPrices[s.symbol];
  const flashCls = prev == null ? '' : (s.price > prev ? 'flash-up' : s.price < prev ? 'flash-dn' : '');
  prevPrices[s.symbol] = s.price;

  return `
    <div class="stock-card ${cls}">
      <div class="stock-header">
        <div class="stock-symbol">${s.symbol}</div>
        <span class="stock-badge ${badgeCls}">${badgeLabel}</span>
      </div>
      <div class="stock-name">${s.shortName || '—'}</div>
      <div class="stock-price ${flashCls}" id="price-${s.symbol.replace(/[^a-z0-9]/gi,'_')}">
        $${price}
      </div>
      <div class="stock-change ${chgCls}">
        ${arrow} ${fmtPct(pct)}
        <span style="opacity:.6;margin-left:4px;font-size:.7rem">${s.changePercent!=null ? '('+fmtPrice(s.change,s.currency)+')' : ''}</span>
      </div>
    </div>`;
}

function privateCard(p) {
  return `
    <div class="stock-card private-card">
      <div class="stock-header">
        <div class="stock-symbol">${p.symbol}</div>
        <span class="stock-badge badge-private">PRIVATE</span>
      </div>
      <div class="stock-name">${p.shortName}</div>

    </div>`;
}

/* ═══════════════════════════════════════════════════════════════════
   GEOLOCATION + MAIN INIT
   ═══════════════════════════════════════════════════════════════════ */
let _lat = null, _lon = null;

function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => {
        _lat = pos.coords.latitude;
        _lon = pos.coords.longitude;
        resolve({ lat: _lat, lon: _lon });
      },
      () => resolve(null),
      { timeout: 8000 }
    );
  });
}

async function refreshAll() {
  renderWeatherSkeleton();
  renderStockSkeleton();
  renderNewsSkeleton();
  startCountdown();

  let loc = _lat ? { lat: _lat, lon: _lon } : await getLocation();

  await Promise.all([
    fetchWeather(loc ? loc.lat : null, loc ? loc.lon : null),
    fetchStocks(),
    fetchNews()
  ]);
}

/* ── BOOT ── */
(async function boot() {
  startCountdown();
  const loc = await getLocation();
  await Promise.all([
    fetchWeather(loc ? loc.lat : null, loc ? loc.lon : null),
    fetchStocks(),
    fetchNews()
  ]);
})();
</script>
